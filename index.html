    <script>
      (function () {
        var STORAGE_EMAIL_KEY = 'pilates_user_email';
        var STORAGE_DEVICE_KEY = 'pilates_device_id';
        var gate = document.getElementById('pq-access-gate');
        var content = document.getElementById('pq-gate-content');

        function getDeviceId() {
          try {
            var id = localStorage.getItem(STORAGE_DEVICE_KEY);
            if (!id) {
              id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 12);
              localStorage.setItem(STORAGE_DEVICE_KEY, id);
            }
            return id;
          } catch {
            return 'dev_' + Math.random().toString(36).slice(2, 12);
          }
        }

        function getSavedEmail() {
          try {
            return localStorage.getItem(STORAGE_EMAIL_KEY) || '';
          } catch {
            return '';
          }
        }

        function saveEmail(email) {
          try { localStorage.setItem(STORAGE_EMAIL_KEY, email); } catch {}
        }

        function clearAccess() {
          try {
            localStorage.removeItem(STORAGE_EMAIL_KEY);
          } catch {}
        }

        function showGate() {
          gate.classList.remove('pq-hidden');
        }
        function hideGate() {
          gate.classList.add('pq-hidden');
        }

        function renderEmailForm(errorMsg) {
          content.innerHTML =
            '<div class="pq-icon">🔐</div>' +
            '<h2 class="pq-title">Acesso exclusivo para alunas</h2>' +
            '<p class="pq-msg">Digite o e-mail usado na sua compra para liberar o acesso às aulas.</p>' +
            '<input type="email" id="pq-email-input" placeholder="Digite seu e-mail" autocomplete="email" />' +
            '<p class="pq-error" id="pq-email-error">' + (errorMsg || '') + '</p>' +
            '<button id="pq-email-submit">Entrar</button>' +
            '<a class="pq-whatsapp-link" href="https://wa.me/5519982532156" target="_blank" rel="noopener">Precisa de ajuda? Fale no WhatsApp 📲</a>';

          var input = document.getElementById('pq-email-input');
          var btn = document.getElementById('pq-email-submit');
          setTimeout(function () { input && input.focus(); }, 100);

          function submit() {
            var email = (input.value || '').trim();
            if (!email || email.indexOf('@') === -1) {
              document.getElementById('pq-email-error').textContent = 'Digite um e-mail válido.';
              return;
            }
            saveEmail(email);
            runVerification(email, false);
          }
          btn.addEventListener('click', submit);
          input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') submit();
          });
        }

        function renderBlocked(mensagem) {
          content.innerHTML =
            '<div class="pq-blocked-badge">🔒</div>' +
            '<h2 class="pq-title">Acesso indisponível</h2>' +
            '<p class="pq-msg">' + (mensagem || 'Não foi possível liberar seu acesso.') + '</p>' +
            '<button id="pq-retry-btn" class="pq-secondary">Tentar novamente</button>' +
            '<a class="pq-whatsapp-link" href="https://wa.me/5519982532156" target="_blank" rel="noopener">Falar com o suporte no WhatsApp 📲</a>';
          document.getElementById('pq-retry-btn').addEventListener('click', function () {
            clearAccess();
            renderEmailForm();
          });
        }

        function renderDeviceConflict(mensagem, email) {
          content.innerHTML =
            '<div class="pq-icon">📱</div>' +
            '<h2 class="pq-title">Outro dispositivo detectado</h2>' +
            '<p class="pq-msg">' + (mensagem || '') + '</p>' +
            '<button id="pq-transfer-btn">Transferir para este aparelho</button>' +
            '<button id="pq-cancel-btn" class="pq-secondary">Cancelar</button>';
          document.getElementById('pq-transfer-btn').addEventListener('click', function () {
            runVerification(email, true);
          });
          document.getElementById('pq-cancel-btn').addEventListener('click', function () {
            clearAccess();
            renderEmailForm();
          });
        }

        function renderVerifying() {
          content.innerHTML =
            '<div class="pq-spinner"></div>' +
            '<p class="pq-msg">Verificando seu acesso...</p>';
        }

        function runVerification(email, transferirDispositivo) {
          renderVerifying();
          var deviceId = getDeviceId();

          fetch('/api/verificar-acesso', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              deviceId: deviceId,
              transferirDispositivo: !!transferirDispositivo,
            }),
          })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (data && data.acesso === true) {
                saveEmail(email);
                hideGate();
                if (window.pilatesOnAccessGranted) window.pilatesOnAccessGranted();
                return;
              }

              // Acesso negado: status bloqueado/cancelado/inativo, e-mail não encontrado,
              // ou conflito de dispositivo aguardando confirmação.
              if (data && data.motivo === 'OUTRO_DISPOSITIVO') {
                renderDeviceConflict(data.mensagem, email);
                return;
              }

              clearAccess();
              renderBlocked(data && data.mensagem);
            })
            .catch(function () {
              content.innerHTML =
                '<div class="pq-icon">📡</div>' +
                '<h2 class="pq-title">Erro de conexão</h2>' +
                '<p class="pq-msg">Não foi possível verificar seu acesso agora. Verifique sua internet e tente novamente.</p>' +
                '<button id="pq-retry-conn-btn">Tentar novamente</button>';
              document.getElementById('pq-retry-conn-btn').addEventListener('click', function () {
                runVerification(email, transferirDispositivo);
              });
            });
        }

        // ── Sempre verifica o acesso a cada abertura do app (PWA ou web),
        // mesmo que o e-mail já esteja salvo localmente. ──
        showGate();
        var savedEmail = getSavedEmail();
        if (savedEmail) {
          runVerification(savedEmail, false);
        } else {
          renderEmailForm();
        }
      })();
    </script>

    <script>
      (function () {
        var deferredPrompt = null;
        var installBtn = document.getElementById('pq-install-btn');
        var iosModal = document.getElementById('pq-ios-install-modal');
        var iosModalClose = document.getElementById('pq-ios-modal-close');
        var installed = false;

        // ── Fonte única de verdade: o app já está instalado/rodando como app? ──
        // Android/Chrome/Edge: display-mode "standalone".
        // iOS Safari: navigator.standalone === true.
        function isStandalone() {
          return window.matchMedia('(display-mode: standalone)').matches ||
            window.navigator.standalone === true;
        }
        function isAppInstalled() {
          return installed || isStandalone();
        }

        // Detecta Safari no iPhone/iPad (iOS não dispara beforeinstallprompt).
        function isIOSSafari() {
          var ua = window.navigator.userAgent || '';
          var isIOS = /iPad|iPhone|iPod/.test(ua) ||
            (ua.includes('Macintosh') && 'ontouchend' in document); // iPadOS 13+ se identifica como Mac
          if (!isIOS) return false;
          var isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS|Chrome|Android/.test(ua);
          return isSafari;
        }

        function hideInstallBtn() {
          installBtn.classList.remove('pq-visible');
        }
        function showInstallBtn() {
          // Nunca exibe o botão se o app já estiver instalado.
          if (isAppInstalled()) {
            hideInstallBtn();
            return;
          }
          installBtn.classList.add('pq-visible');
        }

        function showIOSModal() {
          // Nunca exibe o modal se o app já estiver instalado.
          if (isAppInstalled()) return;
          iosModal.classList.add('pq-visible');
        }
        function hideIOSModal() {
          iosModal.classList.remove('pq-visible');
        }
        iosModalClose.addEventListener('click', hideIOSModal);
        iosModal.addEventListener('click', function (e) {
          if (e.target === iosModal) hideIOSModal();
        });

        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          // Se o app já estiver instalado, ignora o evento (não guarda o prompt).
          if (isAppInstalled()) return;
          deferredPrompt = e;
          // Se o botão de fallback já estava visível aguardando, mantém disponível.
        });

        window.addEventListener('appinstalled', function () {
          installed = true;
          deferredPrompt = null;
          hideInstallBtn();
          hideIOSModal();
        });

        function triggerInstallPrompt(onDismiss) {
          // Trava de segurança: se o app já estiver instalado, não faz nada.
          if (isAppInstalled()) {
            hideInstallBtn();
            return;
          }
          // iOS Safari não suporta beforeinstallprompt: mostra o passo a passo manual.
          if (isIOSSafari()) {
            showIOSModal();
            return;
          }
          if (!deferredPrompt) {
            // Ainda não há prompt disponível neste momento; mantém/mostra o botão
            // para o usuário tentar novamente quando o navegador disponibilizar o evento.
            if (onDismiss) onDismiss();
            return;
          }
          var promptEvent = deferredPrompt;
          promptEvent.prompt();
          promptEvent.userChoice.then(function (choice) {
            if (choice.outcome === 'accepted') {
              hideInstallBtn();
            } else if (onDismiss) {
              onDismiss();
            }
            // Cada evento só pode ser usado uma vez; aguarda o navegador
            // disparar um novo beforeinstallprompt para futuras tentativas.
            deferredPrompt = null;
          });
        }

        installBtn.addEventListener('click', function () {
          triggerInstallPrompt(showInstallBtn);
        });

        // Chamado pelo gate de acesso assim que o e-mail é validado com sucesso.
        window.pilatesOnAccessGranted = function () {
          // Se o app já estiver instalado, não exibe nenhuma opção de instalação.
          if (isAppInstalled()) return;
          // Pequeno atraso para não competir com a transição de saída do gate.
          setTimeout(function () {
            if (isAppInstalled()) return;
            if (isIOSSafari()) {
              // iOS não suporta prompt automático: mostra direto o botão,
              // que ao ser tocado abre o passo a passo manual.
              showInstallBtn();
              return;
            }
            if (deferredPrompt) {
              // Prompt automático disponível: tenta abrir direto.
              triggerInstallPrompt(showInstallBtn);
            } else {
              // O navegador não disponibilizou (ou não vai disponibilizar) o prompt
              // automático agora — não há tentativa condicionada a esperar; mostramos
              // o botão de instalação manual imediatamente.
              showInstallBtn();
            }
          }, 600);
        };
      })();
    </script>

      /* Em telas maiores (tablet+), mantém tamanho original */
      @media (min-width: 640px) {
        [data-spopup="1"] {
          max-width: 168px !important;
        }
        [data-spopup="1"] > div {
          padding: 8px !important;
          gap: 6px !important;
        }
        [data-spopup="1"] > div > div:first-child {
          width: 24px !important;
          height: 24px !important;
          min-width: 24px !important;

        }

      /* ── Ajustes "Minhas Aulas": remover espaço vazio antes dos cards ── */
      [class*="sm:justify-between gap-3 mb-2 px-0"] + div.relative {
        margin-top: 0.25rem !important;
      }

      /* Setas de navegação (já ocultas por padrão) — garantia extra */
      [class*="sm:justify-between gap-3 mb-2 px-0"] > [class="hidden"] {
        display: none !important;
      }

      /* ── Cards dos módulos: mais largos, mais próximos das bordas ── */
      [class*="grid grid-cols-2 gap-2 pb-8 pt-0"] {
        margin-left: -0.75rem !important;
        margin-right: -0.75rem !important;
      }

      /* ── Faixa "MÓDULO X": fonte ampliada para 18px, alinhada ao canto da capa, sem ultrapassar a borda ── */
      [class*="top-1.5 left-1.5 bg-[#d4af37]"][class*="rounded-full"] {
        top: 4px !important;
        left: 4px !important;
        padding: 3px 8px !important;
        font-size: 15px !important;
        line-height: 1.2 !important;
        letter-spacing: 0.5px !important;
        max-width: calc(100% - 8px) !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }

      /* ── Card "Certificado de Conclusão": borda dourada premium + centralizado ── */
      /* Agora ocupa 1 coluna (não mais col-span-2) para abrir espaço ao card "Novo módulo" ao lado */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"] {
        background: rgba(42, 26, 64, 0.45) !important;
        backdrop-filter: blur(18px) !important;
        -webkit-backdrop-filter: blur(18px) !important;
        border: 1px solid rgba(212, 175, 55, 0.3) !important;
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.12), 0 12px 32px rgba(0, 0, 0, 0.35) !important;
        justify-self: center !important;
        width: 100% !important;
        grid-column: span 1 / span 1 !important;
      }

      /* ── Certificado: cadeado exatamente centralizado no centro da capa ── */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"] .bg-black\/40.backdrop-blur-\[1px\].rounded-2xl {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 10px !important;
        width: 100% !important;
        height: 100% !important;
      }

      /* ── Seção de texto abaixo da capa: compacta ── */
      [class*="p-4 flex flex-col justify-center items-center bg-[#1a1025] text-center"] {
        background: rgba(26, 16, 37, 0.35) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        padding: 14px 20px !important;
        gap: 8px !important;
      }

      /* ── Ícones do certificado ── */
      /* Reduzidos porque o card do certificado passou a ocupar 1 coluna (mais estreito) */
      [class*="w-14 h-14 text-[#d4af37]"] {
        width: 44px !important;
        height: 44px !important;
      }
      [class*="w-20 h-20 text-[#d4af37] drop-shadow-md"] {
        width: 52px !important;
        height: 52px !important;
      }

      /* ── Remover completamente a tela de login antiga (nome + senha) ── */
      [class*="z-[9998]"],
      [class*="z-[9999]"] {
        display: none !important;
      }

      /* ── Novo card "Em breve" (ao lado do Certificado) ── */
      #pq-coming-soon-card {
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        background: rgba(42, 26, 64, 0.45);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(212, 175, 55, 0.3);
        display: flex;
        flex-direction: column;
        cursor: default;
      }
      #pq-coming-soon-card .pq-cs-cover {
        position: relative;
        aspect-ratio: 1 / 1;
        width: 100%;
        overflow: hidden;
      }
      #pq-coming-soon-card .pq-cs-cover img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(4px);
        transform: scale(1.05);
      }
      #pq-coming-soon-card .pq-cs-overlay {
        position: absolute;
        inset: 0;
        background: rgba(26, 16, 37, 0.7);
        z-index: 1;
      }
      #pq-coming-soon-card .pq-cs-content {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-align: center;
      }
      #pq-coming-soon-card .pq-cs-lock {
        width: 44px;
        height: 44px;
        color: #d4af37;
        flex-shrink: 0;
      }
      #pq-coming-soon-card .pq-cs-title {
        color: #fff;
        font-size: 1.125rem;
        line-height: 1.3;
        font-weight: 700;
        margin: 0;
      }
      #pq-coming-soon-card .pq-cs-text {
        padding: 14px 20px;
        background: rgba(26, 16, 37, 0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        text-align: center;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #pq-coming-soon-card .pq-cs-text p {
        margin: 0;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.4;
      }

      /* ── Botão WhatsApp: evitar que fique escondido atrás da barra Aulas/Bônus ── */
      body:has(#pq-bottom-nav) .fixed.bottom-6.right-4.z-50 {
        bottom: 84px !important;
      }
    </style>

    <!-- Ajustes do card Certificado + inserção do card "Novo módulo (Em breve)" -->
    <script>
      (function() {
        // ── Traduções do card "Novo módulo", seguindo o mesmo padrão de idioma do app ──
        var LANG_STORAGE_KEY = 'pilates_lang';
        var DEFAULT_LANG = 'pt-BR';
        var TRANSLATIONS = {
          'pt-BR': { comingSoon: 'Em breve', newLessons: '🚀 Novas Aulas em Produção' },
          'pt-PT': { comingSoon: 'Brevemente', newLessons: '🚀 Novas Aulas em Produção' },
          'es':    { comingSoon: 'Próximamente', newLessons: '🚀 Nuevas Clases en Producción' },
          'en':    { comingSoon: 'Coming soon', newLessons: '🚀 New Classes in Production' },
          'fr':    { comingSoon: 'Bientôt disponible', newLessons: '🚀 Nouveaux Cours en Préparation' }
        };

        function getCurrentLang() {
          try {
            var lang = localStorage.getItem(LANG_STORAGE_KEY);
            if (lang && TRANSLATIONS[lang]) return lang;
          } catch {}
          return DEFAULT_LANG;
        }

        function applyComingSoonTexts() {
          var card = document.getElementById('pq-coming-soon-card');
          if (!card) return;
          var t = TRANSLATIONS[getCurrentLang()] || TRANSLATIONS[DEFAULT_LANG];
          var titleEl = card.querySelector('.pq-cs-title');
          var textEl = card.querySelector('.pq-cs-text p');
          if (titleEl) titleEl.textContent = t.comingSoon;
          if (textEl) textEl.textContent = t.newLessons;
        }

        function fixCertCard() {
          // Encontrar o card do certificado (agora col-span-1) pela imagem capa7.png
          var cards = document.querySelectorAll('[class*="col-span-2"]');
          var certCard = null;
          cards.forEach(function(card) {
            var img = card.querySelector('img[src*="capa7"]');
            if (img) certCard = card;
          });
          if (!certCard) return;
          certCard.dataset.pqFixed = '1';

          insertComingSoonCard(certCard);
        }

        function insertComingSoonCard(certCard) {
          if (document.getElementById('pq-coming-soon-card')) return;
          var grid = certCard.parentElement;
          if (!grid) return;

          var card = document.createElement('div');
          card.id = 'pq-coming-soon-card';
          card.setAttribute('aria-disabled', 'true');
          card.innerHTML =
            '<div class="pq-cs-cover">' +
              '<img src="/capa6.png" alt="Novo módulo em breve" />' +
              '<div class="pq-cs-overlay"></div>' +
              '<div class="pq-cs-content">' +
                '<svg class="pq-cs-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                  '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>' +
                  '<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' +
                '</svg>' +
                '<h3 class="pq-cs-title"></h3>' +
              '</div>' +
            '</div>' +
            '<div class="pq-cs-text">' +
              '<p></p>' +
            '</div>';

          // Insere logo após o card do certificado, no mesmo grid
          certCard.insertAdjacentElement('afterend', card);
          applyComingSoonTexts();
        }

        // Atualiza os textos do card sempre que o idioma do app mudar
        window.addEventListener('storage', function (e) {
          if (e.key === LANG_STORAGE_KEY) applyComingSoonTexts();
        });
        window.addEventListener('pilates:lang', applyComingSoonTexts);

        var obs = new MutationObserver(fixCertCard);
        obs.observe(document.body || document.documentElement, { childList: true, subtree: true });
        if (document.body) fixCertCard();
        document.addEventListener('DOMContentLoaded', fixCertCard);
      })();
    </script>
  </body>
