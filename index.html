<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pilates em Casa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1025">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <script type="module" crossorigin src="/assets/index-VrPcdrUj.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BQ8LcfVF.css">
  </head>
  <body>
    <div id="root"></div>
    <script src="/quiz.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>

    <style>
      /* ── Popup social proof: reduzir ~50% no mobile ── */
      [data-spopup="1"] {
        max-width: 76px !important;
      }
      [data-spopup="1"] > div {
        padding: 5px !important;
        gap: 5px !important;
      }
      /* Avatar */
      [data-spopup="1"] > div > div:first-child {
        width: 14px !important;
        height: 14px !important;
        min-width: 14px !important;
        font-size: 5px !important;
      }
      /* Textos */
      [data-spopup="1"] p {
        font-size: 5.5px !important;
        line-height: 1.3 !important;
        margin-bottom: 1px !important;
      }
      /* Botão fechar */
      [data-spopup="1"] button {
        font-size: 8px !important;
        padding: 0 !important;
      }
      /* Em telas maiores (tablet+), mantém tamanho original */
      @media (min-width: 640px) {
        [data-spopup="1"] {
          max-width: 168px !important;
        }
        [data-spopup="1"] > div {
          padding: 8px !important;
          gap: 6px !important;
        }
        [data-spopup="1"] > div > div:first-child {
          width: 24px !important;
          height: 24px !important;
          min-width: 24px !important;
          font-size: 9px !important;
        }
        [data-spopup="1"] p {
          font-size: inherit !important;
          line-height: inherit !important;
          margin-bottom: inherit !important;
        }
        [data-spopup="1"] button {
          font-size: inherit !important;
        }
      }

      /* ── Ajustes "Minhas Aulas": remover espaço vazio antes dos cards ── */
      [class*="sm:justify-between gap-3 mb-2 px-0"] + div.relative {
        margin-top: 0.25rem !important;
      }

      /* Setas de navegação (já ocultas por padrão) — garantia extra */
      [class*="sm:justify-between gap-3 mb-2 px-0"] > [class="hidden"] {
        display: none !important;
      }

      /* ── Cards dos módulos: mais largos, mais próximos das bordas ── */
      [class*="grid grid-cols-2 gap-2 pb-8 pt-0"] {
        margin-left: -0.75rem !important;
        margin-right: -0.75rem !important;
      }

      /* ── Faixa "MÓDULO X": ~20% menor, alinhada ao canto da capa, sem ultrapassar a borda ── */
      [class*="top-1.5 left-1.5 bg-[#d4af37]"][class*="rounded-full"] {
        top: 4px !important;
        left: 4px !important;
        padding: 1.5px 5px !important;
        font-size: 6px !important;
        line-height: 1.2 !important;
        letter-spacing: 0.5px !important;
        max-width: calc(100% - 8px) !important;
      }

      /* ── Card "Certificado de Conclusão": destaque premium, vidro/blur, largura total ── */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"] {
        background: rgba(42, 26, 64, 0.45) !important;
        backdrop-filter: blur(18px) !important;
        -webkit-backdrop-filter: blur(18px) !important;
        border: 1px solid rgba(212, 175, 55, 0.3) !important;
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.12), 0 12px 32px rgba(0, 0, 0, 0.35) !important;
      }

      /* ── Capa do certificado: proporção de dois módulos lado a lado (landscape) ── */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"] [class*="relative aspect-square w-full overflow-hidden"] {
        aspect-ratio: 2 / 1.1 !important;
        height: auto !important;
      }

      /* ── Seção de texto abaixo da capa: compacta ── */
      [class*="p-4 flex flex-col justify-center items-center bg-[#1a1025] text-center"] {
        background: rgba(26, 16, 37, 0.35) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        padding: 14px 20px !important;
        gap: 8px !important;
      }

      /* ── Ícones do certificado um pouco maiores, para preencher melhor o espaço ── */
      [class*="w-14 h-14 text-[#d4af37]"] {
        width: 68px !important;
        height: 68px !important;
      }
      [class*="w-20 h-20 text-[#d4af37] drop-shadow-md"] {
        width: 88px !important;
        height: 88px !important;
      }

      /* ── Cadeado grande centralizado sobre a capa bloqueada ── */
      /* Ocultar o painel de texto interno no estado bloqueado */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"][class*="cursor-not-allowed"] [class*="bg-black/40 backdrop-blur"] {
        display: none !important;
      }
      /* Mostrar apenas o cadeado SVG grande, centralizado na imagem */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"][class*="cursor-not-allowed"] [class*="absolute inset-0 flex flex-col items-center justify-center z-10"] {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 10px !important;
        z-index: 10 !important;
      }
      /* Cadeado grande via elemento injetado por JS abaixo */

      /* ── Remover completamente a tela de login antiga (nome + senha) ── */
      [class*="z-[9998]"],
      [class*="z-[9999]"] {
        display: none !important;
      }
    </style>
  </body>
</html>
