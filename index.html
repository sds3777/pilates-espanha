  <body>
    <!-- ── Verificação de acesso (Supabase) ── -->
    <style>
      #pq-access-gate {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: #1a1025;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: 'Cormorant Garamond', serif, sans-serif;
      }
      #pq-access-gate.pq-hidden { display: none !important; }
      #pq-access-gate .pq-box {
        width: 100%;
        max-width: 400px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      #pq-access-gate .pq-spinner {
        width: 44px;
        height: 44px;
        border: 3px solid #2a1a40;
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: pq-spin 0.8s linear infinite;
      }
      @keyframes pq-spin { to { transform: rotate(360deg); } }
      #pq-access-gate .pq-title {
        color: #d4af37;
        font-family: 'Cinzel', serif;
        font-size: 20px;
        letter-spacing: 1px;
        margin: 0;
      }
      #pq-access-gate .pq-msg {
        color: #c9a8f0;
        font-size: 15px;
        line-height: 1.5;
        margin: 0;
      }
      #pq-access-gate input[type="email"] {
        width: 100%;
        padding: 14px 18px;
        border-radius: 999px;
        background: #2a1a40;
        border: 1px solid #7c3aed;
        color: #fff;
        text-align: center;
        font-size: 15px;
        outline: none;
        box-sizing: border-box;
      }
      #pq-access-gate input[type="email"]:focus { border-color: #d4af37; }
      #pq-access-gate button {
        width: 100%;
        padding: 14px 18px;
        border-radius: 999px;
        background: #d4af37;
        color: #1a0a20;
        font-weight: 700;
        font-family: 'Cinzel', serif;
        letter-spacing: 1px;
        border: none;
        font-size: 15px;
        cursor: pointer;
      }
      #pq-access-gate button:disabled { opacity: 0.6; cursor: default; }
      #pq-access-gate button.pq-secondary {
        background: transparent;
        border: 1px solid rgba(212,175,55,0.5);
        color: #d4af37;
      }
      #pq-access-gate .pq-error {
        color: #ff8a8a;
        font-size: 13px;
        margin: 0;
        min-height: 16px;
      }
      #pq-access-gate .pq-whatsapp-link {
        color: #d4af37;
        font-size: 13px;
        text-decoration: underline;
      }
    </style>
    <div id="pq-access-gate">
      <div class="pq-box" id="pq-gate-content">
        <div class="pq-spinner"></div>
        <p class="pq-msg">Verificando seu acesso...</p>
      </div>
    </div>
    <script>
      (function () {
        var STORAGE_EMAIL_KEY = 'pilates_user_email';
        var STORAGE_DEVICE_KEY = 'pilates_device_id';
        var gate = document.getElementById('pq-access-gate');
        var content = document.getElementById('pq-gate-content');

        function getDeviceId() {
          try {
            var id = localStorage.getItem(STORAGE_DEVICE_KEY);
            if (!id) {
              id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 12);
              localStorage.setItem(STORAGE_DEVICE_KEY, id);
            }
            return id;
          } catch {
            return 'dev_' + Math.random().toString(36).slice(2, 12);
          }
        }

        function getSavedEmail() {
          try {
            return localStorage.getItem(STORAGE_EMAIL_KEY) || '';
          } catch {
            return '';
          }
        }

        function saveEmail(email) {
          try { localStorage.setItem(STORAGE_EMAIL_KEY, email); } catch {}
        }

        function clearAccess() {
          try {
            localStorage.removeItem(STORAGE_EMAIL_KEY);
          } catch {}
        }

        function showGate() {
          gate.classList.remove('pq-hidden');
        }
        function hideGate() {
          gate.classList.add('pq-hidden');
        }

        function renderEmailForm(errorMsg) {
          content.innerHTML =
            '<h2 class="pq-title">Acesso exclusivo para alunas 💛</h2>' +
            '<p class="pq-msg">Digite o e-mail usado na sua compra para liberar o acesso às aulas.</p>' +
            '<input type="email" id="pq-email-input" placeholder="Digite seu e-mail" autocomplete="email" />' +
            '<p class="pq-error" id="pq-email-error">' + (errorMsg || '') + '</p>' +
            '<button id="pq-email-submit">Entrar</button>' +
            '<a class="pq-whatsapp-link" href="https://wa.me/5519982532156" target="_blank" rel="noopener">Precisa de ajuda? Fale no WhatsApp</a>';

          var input = document.getElementById('pq-email-input');
          var btn = document.getElementById('pq-email-submit');
          setTimeout(function () { input && input.focus(); }, 100);

          function submit() {
            var email = (input.value || '').trim();
            if (!email || email.indexOf('@') === -1) {
              document.getElementById('pq-email-error').textContent = 'Digite um e-mail válido.';
              return;
            }
            saveEmail(email);
            runVerification(email, false);
          }
          btn.addEventListener('click', submit);
          input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') submit();
          });
        }

        function renderBlocked(mensagem) {
          content.innerHTML =
            '<h2 class="pq-title">Acesso indisponível</h2>' +
            '<p class="pq-msg">' + (mensagem || 'Não foi possível liberar seu acesso.') + '</p>' +
            '<button id="pq-retry-btn" class="pq-secondary">Tentar novamente</button>' +
            '<a class="pq-whatsapp-link" href="https://wa.me/5519982532156" target="_blank" rel="noopener">Falar com o suporte no WhatsApp</a>';
          document.getElementById('pq-retry-btn').addEventListener('click', function () {
            clearAccess();
            renderEmailForm();
          });
        }

        function renderDeviceConflict(mensagem, email) {
          content.innerHTML =
            '<h2 class="pq-title">Outro dispositivo detectado</h2>' +
            '<p class="pq-msg">' + (mensagem || '') + '</p>' +
            '<button id="pq-transfer-btn">Transferir para este aparelho</button>' +
            '<button id="pq-cancel-btn" class="pq-secondary">Cancelar</button>';
          document.getElementById('pq-transfer-btn').addEventListener('click', function () {
            runVerification(email, true);
          });
          document.getElementById('pq-cancel-btn').addEventListener('click', function () {
            clearAccess();
            renderEmailForm();
          });
        }

        function renderVerifying() {
          content.innerHTML =
            '<div class="pq-spinner"></div>' +
            '<p class="pq-msg">Verificando seu acesso...</p>';
        }

        function runVerification(email, transferirDispositivo) {
          renderVerifying();
          var deviceId = getDeviceId();

          fetch('/api/verificar-acesso', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              deviceId: deviceId,
              transferirDispositivo: !!transferirDispositivo,
            }),
          })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (data && data.acesso === true) {
                saveEmail(email);
                hideGate();
                return;
              }

              // Acesso negado: status bloqueado/cancelado/inativo, e-mail não encontrado,
              // ou conflito de dispositivo aguardando confirmação.
              if (data && data.motivo === 'OUTRO_DISPOSITIVO') {
                renderDeviceConflict(data.mensagem, email);
                return;
              }

              clearAccess();
              renderBlocked(data && data.mensagem);
            })
            .catch(function () {
              content.innerHTML =
                '<h2 class="pq-title">Erro de conexão</h2>' +
                '<p class="pq-msg">Não foi possível verificar seu acesso agora. Verifique sua internet e tente novamente.</p>' +
                '<button id="pq-retry-conn-btn">Tentar novamente</button>';
              document.getElementById('pq-retry-conn-btn').addEventListener('click', function () {
                runVerification(email, transferirDispositivo);
              });
            });
        }

        // ── Sempre verifica o acesso a cada abertura do app (PWA ou web),
        // mesmo que o e-mail já esteja salvo localmente. ──
        showGate();
        var savedEmail = getSavedEmail();
        if (savedEmail) {
          runVerification(savedEmail, false);
        } else {
          renderEmailForm();
        }
      })();
    </script>

      /* ── Botão WhatsApp: evitar que fique escondido atrás da barra Aulas/Bônus ── */

      }

    <!-- Ajustes do card Certificado + inserção do card "Novo módulo (Em breve)" -->
    <script>
      (function() {
        function fixCertCard() {
          // Encontrar o card do certificado (agora col-span-1) pela imagem capa7.png
          var cards = document.querySelectorAll('[class*="col-span-2"]');
          var certCard = null;
          cards.forEach(function(card) {
            var img = card.querySelector('img[src*="capa7"]');
            if (img) certCard = card;
          });
          if (!certCard) return;
          certCard.dataset.pqFixed = '1';

          // Marca o ícone de cadeado do certificado para que o CSS possa centralizá-lo com segurança
          var lockIcon = certCard.querySelector('.bg-black\\/40.backdrop-blur-\\[1px\\].rounded-2xl svg');
          if (lockIcon && !lockIcon.id) lockIcon.id = 'pq-cert-lock-icon';

          insertComingSoonCard(certCard);
        }

        function insertComingSoonCard(certCard) {
          if (document.getElementById('pq-coming-soon-card')) return;
          var grid = certCard.parentElement;
          if (!grid) return;

          var card = document.createElement('div');
          card.id = 'pq-coming-soon-card';
          card.setAttribute('aria-disabled', 'true');
          card.innerHTML =
            '<div class="pq-cs-cover">' +
              '<img src="/capa6.png" alt="Novo módulo em breve" />' +
              '<div class="pq-cs-overlay"></div>' +
              '<div class="pq-cs-content">' +
                '<svg class="pq-cs-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                  '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>' +
                  '<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' +
                '</svg>' +
                '<h3 class="pq-cs-title">Novo módulo</h3>' +
              '</div>' +
            '</div>' +
            '<div class="pq-cs-text">' +
              '<p>🚀 Em breve...</p>' +
              '<p class="pq-cs-sub">✨ Novas aulas em produção</p>' +
            '</div>';

          // Insere logo após o card do certificado, no mesmo grid
          certCard.insertAdjacentElement('afterend', card);
        }

        var obs = new MutationObserver(fixCertCard);
        obs.observe(document.body || document.documentElement, { childList: true, subtree: true });
        if (document.body) fixCertCard();
        document.addEventListener('DOMContentLoaded', fixCertCard);
      })();
    </script>
