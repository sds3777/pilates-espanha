<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pilates em Casa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-VrPcdrUj.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BQ8LcfVF.css">
  </head>
  <body>
    <div id="root"></div>
    <script src="/quiz.js"></script>

    <style>
      /* ── Popup social proof: reduzir ~50% no mobile ── */
      [data-spopup="1"] {
        max-width: 76px !important;
      }
      [data-spopup="1"] > div {
        padding: 5px !important;
        gap: 5px !important;
      }
      /* Avatar */
      [data-spopup="1"] > div > div:first-child {
        width: 14px !important;
        height: 14px !important;
        min-width: 14px !important;
        font-size: 5px !important;
      }
      /* Textos */
      [data-spopup="1"] p {
        font-size: 5.5px !important;
        line-height: 1.3 !important;
        margin-bottom: 1px !important;
      }
      /* Botão fechar */
      [data-spopup="1"] button {
        font-size: 8px !important;
        padding: 0 !important;
      }
      /* Em telas maiores (tablet+), mantém tamanho original */
      @media (min-width: 640px) {
        [data-spopup="1"] {
          max-width: 168px !important;
        }
        [data-spopup="1"] > div {
          padding: 8px !important;
          gap: 6px !important;
        }
        [data-spopup="1"] > div > div:first-child {
          width: 24px !important;
          height: 24px !important;
          min-width: 24px !important;
          font-size: 9px !important;
        }
        [data-spopup="1"] p {
          font-size: inherit !important;
          line-height: inherit !important;
          margin-bottom: inherit !important;
        }
        [data-spopup="1"] button {
          font-size: inherit !important;
        }
      }

      /* ── Ajustes "Minhas Aulas": remover espaço vazio antes dos cards ── */
      [class*="sm:justify-between gap-3 mb-2 px-0"] + div.relative {
        margin-top: 0.25rem !important;
      }

      /* Setas de navegação (já ocultas por padrão) — garantia extra */
      [class*="sm:justify-between gap-3 mb-2 px-0"] > [class="hidden"] {
        display: none !important;
      }

      /* ── Cards dos módulos: mais largos, mais próximos das bordas ── */
      [class*="grid grid-cols-2 gap-2 pb-8 pt-0"] {
        margin-left: -0.75rem !important;
        margin-right: -0.75rem !important;
      }

      /* ── Faixa "MÓDULO X": mais discreta e elegante sobre a capa ── */
      [class*="top-1.5 left-1.5 bg-[#d4af37]"][class*="rounded-full"] {
        padding: 2px 7px !important;
        font-size: 7px !important;
        line-height: 1.2 !important;
        letter-spacing: 0.5px !important;
      }

      /* ── Card "Certificado de Conclusão": efeito vidro/blur, ocupando a linha toda ── */
      [class*="col-span-2 rounded-2xl overflow-hidden shadow-xl transition-transform"] {
        background: rgba(42, 26, 64, 0.45) !important;
        backdrop-filter: blur(18px) !important;
        -webkit-backdrop-filter: blur(18px) !important;
        border: 1px solid rgba(212, 175, 55, 0.25) !important;
      }
      [class*="p-4 flex flex-col justify-center items-center bg-[#1a1025] text-center"] {
        background: rgba(26, 16, 37, 0.35) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        padding: 22px 20px !important;
        gap: 10px !important;
      }

      /* ── Remover completamente a tela de login antiga (nome + senha) ── */
      [class*="z-[9998]"],
      [class*="z-[9999]"] {
        display: none !important;
      }
    </style>
  </body>
</html>
